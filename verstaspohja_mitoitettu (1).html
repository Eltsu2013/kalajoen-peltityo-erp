<!--
MITAT (mm) muunnettu SVG-koordinaateiksi skaalalla 1px = 25mm
Lähtöpiste: vasen alakulma

Polku vasemmasta alakulmasta ylöspäin myötäpäivään:
1. Ylös 14370mm → y -= 574.8px  (vasen seinä)
2. Oikealle 7400mm → x += 296px  (yläseinä vasen osa)
3. Alas 4900mm → y += 196px      (väliseinä)
4. Oikealle 5020mm → x += 200.8px (yläseinä oikea osa)
5. Alas 9470mm → y += 378.8px    (oikea seinä)
6. Vasemmalle 12420mm → x -= 496.8px (alaseinä)

Lähtöpiste SVG:ssä: x=40, y=630

Pisteet:
A = 40, 630          (vasen alakulma)
B = 40, 55           (vasen yläkulma)   ylös 575
C = 336, 55          (yläseinä väliseinään) oikealle 296
D = 336, 251         (väliseinän alakohta) alas 196
E = 537, 251         (yläseinän jatko) oikealle 201
F = 537, 630         (oikea alakulma) alas 379
→ takaisin A

Kokonaisleveys: 7400+5020 = 12420mm = 497px → F.x - A.x = 497 ✓
Kokonaiskorkeus: 14370mm = 575px ✓ (vasen seinä)
Oikea seinä: 14370-4900 = 9470mm = 379px ✓

SVG-koko: 620 x 700
Pohja siirretty: A=50,650, B=50,75...
-->
