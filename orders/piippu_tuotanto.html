<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piippu — Tuotanto</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  :root {
    --bg: #1e2d20; --panel: #253028; --panel2: #2e3a30;
    --border: #3a5540; --accent: #22c55e; --accent-dim: #16a34a;
    --text: #ededf0; --text-dim: #9595a0;
    --warn: #e8a020; --blue: #3a8fe8; --danger: #e84040;
    --bg2: #2e2e38; --bg3: #3a3a48; --text1: #ededf0; --text2: #9595a0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; }

  header { background: #162018; border-bottom: 1px solid var(--border); padding: 0 16px; height: 52px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 16px; font-weight: 500; color: var(--text); margin-left: 8px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .nav-menu-wrap { position: relative; }
  .nav-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; }
  .nav-btn:hover { background: var(--panel2); }
  .nav-dropdown { display: none; position: absolute; top: 100%; left: 0; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; min-width: 200px; z-index: 200; margin-top: 4px; padding: 4px 0; }
  .nav-dropdown.open { display: block; }
  .nav-section-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; padding: 6px 12px 2px; }
  .nav-item { display: block; padding: 7px 12px; color: var(--text-dim); text-decoration: none; font-size: 13px; }
  .nav-item:hover { background: var(--panel2); color: var(--text); }
  .nav-item.current { color: var(--accent); font-weight: 600; }
  .nav-divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

  .page { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }

  .piippu-header { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 14px 18px; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .piippu-header h2 { font-size: 18px; font-weight: 600; color: var(--accent); flex: 1; }
  .piippu-meta { font-size: 13px; color: var(--text-dim); }
  .piippu-meta strong { color: var(--text); }
  .huomio-box { background: #2a1f0a; border: 1px solid var(--warn); border-radius: 4px; padding: 8px 12px; font-size: 13px; color: var(--warn); margin-bottom: 12px; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

  .section-card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .section-card h3 { font-size: 13px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 14px; background: var(--panel2); border-bottom: 1px solid var(--border); }

  table { width: 100%; border-collapse: collapse; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  thead th { background: var(--panel2); color: var(--text-dim); font-weight: 600; padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody td { padding: 7px 8px; vertical-align: middle; }
  .td-num { text-align: right; font-variant-numeric: tabular-nums; }
  .td-osa { font-weight: 600; }

  /* Statusnapit — leveä näyttö */
  .step-btns { display: flex; gap: 3px; flex-wrap: wrap; }
  .step-btn { padding: 3px 7px; font-size: 10px; font-family: 'IBM Plex Mono', monospace; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; background: var(--panel2); color: var(--text-dim); transition: all 0.15s; white-space: nowrap; }
  .step-btn.active { font-weight: 700; }
  .step-btn.passed { opacity: 0.5; }
  .step-btn[data-key="WAITING"].active { background: var(--border); color: var(--text); border-color: var(--text-dim); }
  .step-btn[data-key="CUT"].active { background: #1a3a5a; color: var(--blue); border-color: var(--blue); }
  .step-btn[data-key="BENT"].active { background: #2a1f0a; color: var(--warn); border-color: var(--warn); }
  .step-btn[data-key="EXTRA"].active { background: #2a1a3a; color: #a855f7; border-color: #a855f7; }
  .step-btn[data-key="DONE"].active { background: #162018; color: var(--accent); border-color: var(--accent); }
  tr.row-done td { opacity: 0.5; }

  /* Mobiili kompakti vaihenappi */
  .step-btn-mobile { display: none; padding: 4px 10px; font-size: 11px; font-family: 'IBM Plex Mono', monospace; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; background: var(--panel2); color: var(--text-dim); white-space: nowrap; }
  .step-btn-mobile.status-WAITING { border-color: var(--text-dim); color: var(--text); }
  .step-btn-mobile.status-CUT  { border-color: var(--blue);   color: var(--blue); }
  .step-btn-mobile.status-BENT { border-color: var(--warn);   color: var(--warn); }
  .step-btn-mobile.status-EXTRA{ border-color: #a855f7;       color: #a855f7; }
  .step-btn-mobile.status-DONE { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 600px) {
    .step-btns { display: none; }
    .step-btn-mobile { display: inline-block; }
    /* Taulukon vaihe-sarake leveämmäksi mobiilissa */
    table { font-size: 11px; }
  }

  /* SVG-kuva */
  .svg-wrap { padding: 12px; background: var(--panel2); }
  .svg-wrap svg { display: block; width: 100%; height: auto; }

  /* Mitat-lista */
  .mitat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 4px 12px; padding: 12px 14px; }
  .mitta-row { font-size: 12px; font-family: 'IBM Plex Mono', monospace; display: flex; justify-content: space-between; gap: 8px; }
  .mitta-label { color: var(--text-dim); }
  .mitta-val { color: var(--text); font-weight: 600; }

  /* Yhteenveto */
  .summary-bar { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 12px 18px; display: flex; flex-wrap: wrap; gap: 16px; align-items: center; margin-bottom: 16px; }
  .summary-item { font-size: 13px; }
  .summary-item strong { color: var(--accent); font-family: 'IBM Plex Mono', monospace; font-size: 15px; }

  /* Takaisin-nappi */
  .back-btn { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; font-family: 'IBM Plex Sans', sans-serif; }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .loading { text-align: center; padding: 60px; color: var(--text-dim); font-size: 15px; }
  .badge { display: inline-block; font-size: 10px; font-family: 'IBM Plex Mono', monospace; padding: 2px 7px; border-radius: 3px; font-weight: 600; }
  .badge-done { background: #162018; color: var(--accent); border: 1px solid var(--accent); }
  .badge-waiting { background: var(--panel2); color: var(--text-dim); border: 1px solid var(--border); }

  /* TULOSTUS */
  @media print {
    body { background: #fff; color: #000; }
    header, .back-btn, .step-btns, .step-btn-mobile, .btn-print { display: none !important; }
    .page { padding: 0; max-width: 100%; }
    .piippu-header { background: #f5f5f5; border: 1px solid #ccc; }
    .piippu-header h2 { color: #000; }
    .piippu-meta { color: #444; }
    .section-card { border: 1px solid #ccc; break-inside: avoid; }
    .section-card h3 { background: #eee; color: #333; }
    thead th { background: #eee; color: #333; }
    tbody td { color: #000; }
    .svg-wrap { background: #fff; }
    /* Piipun pääviivat mustiksi tulostuksessa */
    svg line[stroke="#f1f5f9"] { stroke: #000 !important; }
    svg polyline { stroke: #000 !important; }
    /* Apuviivat (mitat, vinomitta) harmaaksi */
    svg line[stroke="#64748b"] { stroke: #666 !important; }
    svg text { fill: #000 !important; }
    .mitat-grid { columns: 2; }
    .summary-bar { background: #f5f5f5; border: 1px solid #ccc; }
    .summary-item { color: #000; }
    .summary-item strong { color: #000; }
    .huomio-box { background: #fff8e1; border: 1px solid #f0a020; color: #a06000; }
    .mitta-label { color: #666; }
    .mitta-val { color: #000; }
    .two-col { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

<script>
const SUPA_URL = 'https://hjyeugeqmyavxisndlwp.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqeWV1Z2VxbXlhdnhpc25kbHdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExNDM2NzgsImV4cCI6MjA4NjcxOTY3OH0.ZMuN6lruMUHkASUtwnoShiqHLAg6YBEGsC7zMlymLs4';
const headers = { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json' };

const params = new URLSearchParams(window.location.search);
const orderId  = params.get('orderId');
const groupName = decodeURIComponent(params.get('groupName') || '');

const STEPS     = ['Odottaa','Leikattu','Kantattu','Lisätyöt','Valmis'];
const STEP_KEYS = ['WAITING','CUT','BENT','EXTRA','DONE'];
const STEP_COLORS = { WAITING:'var(--border)', CUT:'var(--blue)', BENT:'var(--warn)', EXTRA:'#a855f7', DONE:'var(--accent)' };

function r(n) { return Math.round(n); }

function toggleNav(e) {
  e.stopPropagation();
  document.getElementById('navDropdown').classList.toggle('open');
}
document.addEventListener('click', () => document.getElementById('navDropdown').classList.remove('open'));

// ── Lataa data ────────────────────────────────────────────
async function load() {
  if (!orderId || !groupName) {
    document.getElementById('loading').textContent = 'Virhe: orderId tai groupName puuttuu URL:sta';
    return;
  }

  const res = await fetch(
    `${SUPA_URL}/rest/v1/order_items?order_id=eq.${orderId}&group_name=eq.${encodeURIComponent(groupName)}&profile_type=eq.piippu`+
    `&select=id,nimike,profile_type,aihio_width_mm,material,color,thickness_mm,profile_data,source,`+
    `order_item_rows(id,mitta_mm,paat_mm,kok_mm,kpl,huomio,row_order,production_status,done_qty)`+
    `&order=item_order`,
    { headers }
  );
  const items = await res.json();

  // Hae tilauksen tiedot (asiakas, kohde)
  const oRes = await fetch(
    `${SUPA_URL}/rest/v1/orders?id=eq.${orderId}&select=id,kohde,notes,customers(name)`,
    { headers }
  );
  const orders = await oRes.json();
  const order = orders[0] || {};

  render(items, order);
}

// ── Laske peltirivit profile_data:sta ─────────────────────
function laskePellit(v) {
  if (!v) return { juuret: [], muut: [] };

  const juuret = [], muut = [];
  const rr = n => Math.round(n);

  const leveys = v.leveys||0, suora = v.suora||0, etukork = v.etukork||0;
  const takakork = v.takakork||0, harjalle = v.harjalle||0;
  const vasen = v.vasen||0, oikea = v.oikea||0, poimu = v.poimu||0;
  const k24 = v.k24||0, j25 = v.j25||0;
  const tupla = v.tupla||0, etulis = v.etulis||0, takalis = v.takalis||0;
  const nousu = v.nousu||0, takareuna = v.takareuna||0, harjaylitys = v.harjaylitys||0;
  const juurisauma = v.juurisauma||0;
  const taka1mitta = v.taka1mitta||0, taka2mitta = v.taka2mitta||0, taka3mitta = v.taka3mitta||0;
  const sauma = v.sauma||0, huplis = v.huplis||0, ylareunaV = v.ylareunaV||0;
  const alatupla = v.alatupla||0, vahennys = v.vahennys||0;
  const huptakalis = v.huptakalis||0, hattulis = v.hattulis||0;
  const saumatyyppi = v.saumatyyppi||1, takaKpl = v.takaKpl||1;
  const huppuEtuKpl = v.huppuEtuKpl||1, huppuSivutKpl = v.huppuSivutKpl||1, huppuTakaKpl = v.huppuTakaKpl||1;
  const hasJuuret = true, hasHuppu = true, hasKansi = true, hasHattu = true;

  const korkeuserot = etukork - takakork;
  const vinomitta = Math.sqrt(suora*suora + korkeuserot*korkeuserot);
  const kattokulma_rad = korkeuserot !== 0 ? Math.atan(suora / korkeuserot) : Math.PI/2;
  const p10 = Math.sin(kattokulma_rad) > 0 ? nousu / Math.sin(kattokulma_rad) : nousu;
  const q9 = (nousu + 20);
  const kaltkorj = (huplis/2) * Math.tan(kattokulma_rad);

  // Juuret
  const jEtuLev = leveys + etulis;
  const jEtuPit = (j25>0?j25:tupla) + k24 + j25 + q9;
  juuret.push({ osa:'Juuri etu', lev:rr(jEtuLev), pit:rr(jEtuPit), kpl:1 });

  const nousuKomp = kattokulma_rad>0 ? nousu/Math.tan(kattokulma_rad) : 0;
  const jSivuPit = tupla+j25+k24+vinomitta+nousuKomp+20+30;
  juuret.push({ osa:'Juuri oikea', lev:rr(oikea+poimu+nousu+tupla), pit:rr(jSivuPit), kpl:1 });
  juuret.push({ osa:'Juuri vasen', lev:rr(vasen+poimu+nousu+tupla), pit:rr(jSivuPit), kpl:1 });

  const jTakaLev = vasen+oikea+leveys+tupla*2+poimu*2+takalis;
  if (takaKpl===1) {
    const jTakaPit = harjalle+q9+takareuna+(harjaylitys>0?harjaylitys+j25+tupla:0);
    juuret.push({ osa:'Juuri taka', lev:rr(jTakaLev), pit:rr(jTakaPit), kpl:1 });
  } else if (takaKpl===2) {
    juuret.push({ osa:'Juuri taka 1', lev:rr(jTakaLev), pit:rr(taka1mitta+q9+juurisauma), kpl:1 });
    juuret.push({ osa:'Juuri taka 2', lev:rr(jTakaLev), pit:rr((harjalle-taka1mitta)+juurisauma*2+takareuna+(harjaylitys>0?harjaylitys+j25+tupla:0)), kpl:1 });
  } else if (takaKpl===3) {
    juuret.push({ osa:'Juuri taka 1', lev:rr(jTakaLev), pit:rr(taka1mitta+q9+juurisauma), kpl:1 });
    juuret.push({ osa:'Juuri taka 2', lev:rr(jTakaLev), pit:rr(taka2mitta+juurisauma*3), kpl:1 });
    juuret.push({ osa:'Juuri taka 3', lev:rr(jTakaLev), pit:rr((harjalle-taka1mitta-taka2mitta)+juurisauma*2+takareuna+(harjaylitys>0?harjaylitys+j25+tupla:0)), kpl:1 });
  } else if (takaKpl===4) {
    juuret.push({ osa:'Juuri taka 1', lev:rr(jTakaLev), pit:rr(taka1mitta+q9+juurisauma), kpl:1 });
    juuret.push({ osa:'Juuri taka 2', lev:rr(jTakaLev), pit:rr(taka2mitta+juurisauma*3), kpl:1 });
    juuret.push({ osa:'Juuri taka 3', lev:rr(jTakaLev), pit:rr(taka3mitta+juurisauma*3), kpl:1 });
    juuret.push({ osa:'Juuri taka 4', lev:rr(jTakaLev), pit:rr((harjalle-taka1mitta-taka2mitta-taka3mitta)+juurisauma*2+takareuna+(harjaylitys>0?harjaylitys+j25+tupla:0)), kpl:1 });
  }

  // Huppu
  const hEtuKork  = etukork  + ylareunaV + alatupla + kaltkorj - vahennys;
  const hTakaKork = takakork + ylareunaV + alatupla - kaltkorj - vahennys;

  if (huppuEtuKpl===1) {
    muut.push({ osa:'Huppu etu', lev:rr(leveys+sauma*2+huplis), pit:rr(hEtuKork), kpl:1 });
  } else if (huppuEtuKpl===2) {
    muut.push({ osa:'Huppu etu 1', lev:rr(leveys/2+huplis/2+sauma*2), pit:rr(hEtuKork), kpl:1 });
    muut.push({ osa:'Huppu etu 2', lev:rr(leveys/2+huplis/2+sauma*3), pit:rr(hEtuKork), kpl:1 });
  } else {
    muut.push({ osa:'Huppu etu 1', lev:rr(leveys/3+huplis/3+sauma*2), pit:rr(hEtuKork), kpl:1 });
    muut.push({ osa:'Huppu etu 2', lev:rr(leveys/3+huplis/3+sauma*3), pit:rr(hEtuKork), kpl:1 });
    muut.push({ osa:'Huppu etu 3', lev:rr(leveys/3+huplis/3+sauma*3), pit:rr(hEtuKork), kpl:1 });
  }

  if (huppuSivutKpl===1) {
    const hSivLev = saumatyyppi===1 ? suora+sauma*3+huplis : suora+sauma*4+huplis+huptakalis;
    muut.push({ osa:'Huppu sivut', lev:rr(hSivLev), pit:rr(hEtuKork), kpl:2 });
  } else if (huppuSivutKpl===2) {
    const lev = saumatyyppi===1 ? suora/2+huplis/2+sauma*3 : suora/2+huplis/2+sauma*3+huptakalis/2;
    muut.push({ osa:'Huppu sivut 1', lev:rr(lev), pit:rr(hEtuKork), kpl:2 });
    muut.push({ osa:'Huppu sivut 2', lev:rr(lev), pit:rr((hEtuKork+hTakaKork)/2), kpl:2 });
  } else {
    const lev = saumatyyppi===1 ? suora/3+huplis/3+sauma*3 : suora/3+huplis/3+sauma*3+huptakalis/3;
    const diff = hEtuKork-hTakaKork;
    muut.push({ osa:'Huppu sivut 1', lev:rr(lev), pit:rr(hEtuKork), kpl:2 });
    muut.push({ osa:'Huppu sivut 2', lev:rr(lev), pit:rr(hEtuKork-diff/3), kpl:2 });
    muut.push({ osa:'Huppu sivut 3', lev:rr(lev), pit:rr(hEtuKork-diff*2/3), kpl:2 });
  }

  if (saumatyyppi===2) {
    if (huppuTakaKpl===1) muut.push({ osa:'Huppu taka', lev:rr(leveys+sauma*2+huplis), pit:rr(hTakaKork), kpl:1 });
    else if (huppuTakaKpl===2) {
      muut.push({ osa:'Huppu taka 1', lev:rr(leveys/2+huplis/2+sauma*2), pit:rr(hTakaKork), kpl:1 });
      muut.push({ osa:'Huppu taka 2', lev:rr(leveys/2+huplis/2+sauma*3), pit:rr(hTakaKork), kpl:1 });
    } else {
      muut.push({ osa:'Huppu taka 1', lev:rr(leveys/3+huplis/3+sauma*2), pit:rr(hTakaKork), kpl:1 });
      muut.push({ osa:'Huppu taka 2', lev:rr(leveys/3+huplis/3+sauma*3), pit:rr(hTakaKork), kpl:1 });
      muut.push({ osa:'Huppu taka 3', lev:rr(leveys/3+huplis/3+sauma*3), pit:rr(hTakaKork), kpl:1 });
    }
  } else {
    if (huppuTakaKpl===1) muut.push({ osa:'Huppu taka', lev:rr(leveys+sauma*4+huplis+huptakalis), pit:rr(hTakaKork), kpl:1 });
    else if (huppuTakaKpl===2) {
      muut.push({ osa:'Huppu taka 1', lev:rr(leveys/2+huplis/2+huptakalis/2+sauma*3), pit:rr(hTakaKork), kpl:1 });
      muut.push({ osa:'Huppu taka 2', lev:rr(leveys/2+huplis/2+huptakalis/2+sauma*4), pit:rr(hTakaKork), kpl:1 });
    } else {
      muut.push({ osa:'Huppu taka 1', lev:rr(leveys/3+huplis/3+huptakalis/2+sauma*3), pit:rr(hTakaKork), kpl:1 });
      muut.push({ osa:'Huppu taka 2', lev:rr(leveys/3+huplis/3+sauma*3), pit:rr(hTakaKork), kpl:1 });
      muut.push({ osa:'Huppu taka 3', lev:rr(leveys/3+huplis/3+huptakalis/2+sauma*4), pit:rr(hTakaKork), kpl:1 });
    }
  }

  muut.push({ osa:'Kansi', lev:rr(leveys+ylareunaV*4+huplis+10), pit:rr(suora+ylareunaV*4+huplis+10), kpl:1 });
  muut.push({ osa:'Hattu', lev:rr(leveys+hattulis), pit:rr(suora+hattulis), kpl:1 });

  return { juuret, muut };
}

// ── Piirrä SVG-kuva ────────────────────────────────────────
function piirraKuvaSVG(v) {
  if (!v) return '';
  const leveys=v.leveys||0, suora=v.suora||0, etukork=v.etukork||0;
  const takakork=v.takakork||0, harjalle=v.harjalle||0;
  const k24=v.k24||0, j25=v.j25||0, nousu=v.nousu||0;
  const takareuna=v.takareuna||0, harjaylitys=v.harjaylitys||0;
  const huplis=v.huplis||0, ylareunaV=v.ylareunaV||0, alatupla=v.alatupla||0;
  const vahennys=v.vahennys||0;
  const huppuSivutKpl=v.huppuSivutKpl||1, sauma=v.sauma||0, huptakalis=v.huptakalis||0;
  const saumatyyppi=v.saumatyyppi||1;

  const korkeuserot=etukork-takakork;
  const kattokulma_rad=korkeuserot!==0?Math.atan(suora/korkeuserot):Math.PI/2;
  const kaltkorj=(huplis/2)*Math.tan(kattokulma_rad);
  const hEtuKork=etukork+ylareunaV+alatupla+kaltkorj-vahennys;
  const hTakaKork=takakork+ylareunaV+alatupla-kaltkorj-vahennys;
  const vinomitta=Math.sqrt(suora*suora+korkeuserot*korkeuserot);
  const p10=Math.sin(kattokulma_rad)>0?nousu/Math.sin(kattokulma_rad):nousu;
  const q9=nousu+20;

  let hSivEtenemä=0;
  if (huppuSivutKpl>=2) {
    const sivLev=huppuSivutKpl===2
      ?(saumatyyppi===1?suora/2+huplis/2+sauma*3:suora/2+huplis/2+sauma*3+huptakalis/2)
      :(saumatyyppi===1?suora/3+huplis/3+sauma*3:suora/3+huplis/3+sauma*3+huptakalis/3);
    hSivEtenemä=r(sivLev-sauma*3);
  }

  const W=900,H=380,mL=110,mR=160,mT=30,mB=30;
  const drawW=W-mL-mR, drawH=H-mT-mB;
  const maxKork=Math.max(etukork,takakork)||1;
  const etuUloke=k24||50;
  const kokonaisLev=etuUloke+(suora||1)+(harjalle||1);
  const scaleX=drawW*0.92/kokonaisLev, scaleY=drawH*0.72/maxKork;
  const scale=Math.min(scaleX,scaleY);
  const etuX=mL+etuUloke*scale, piipW=suora*scale, takaX=etuX+piipW;
  const etuY=mT+drawH*0.88, takaY=etuY-(etukork-takakork)*scale;
  const slope=piipW>0?(takaY-etuY)/piipW:0;
  const kattoVasenX=etuX-etuUloke*scale, kattoVasenY=etuY-slope*(etuUloke*scale);
  const harjW=harjalle*scale, harjaX=takaX+harjW, harjaY=takaY+slope*harjW;
  const ylaY=Math.min(etuY-etukork*scale,takaY-takakork*scale);
  const kattoLen=Math.sqrt((harjaX-kattoVasenX)**2+(harjaY-kattoVasenY)**2)||1;
  const kattoDX=(harjaX-kattoVasenX)/kattoLen, kattoDY=(harjaY-kattoVasenY)/kattoLen;
  const normX=kattoDY, normY=-kattoDX;
  const c1='#f1f5f9',c2='#64748b',cInfo='#38bdf8';

  let h='';
  // Nuolimääritelmä
  h+=`<defs><marker id="arr2" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M1,1 L5,3 L1,5" fill="none" stroke="${c2}" stroke-width="1"/></marker></defs>`;

  h+=`<line x1="${kattoVasenX}" y1="${kattoVasenY}" x2="${harjaX}" y2="${harjaY}" stroke="${c2}" stroke-width="1.5" stroke-linecap="round"/>`;
  h+=`<line x1="${etuX}" y1="${etuY}" x2="${etuX}" y2="${ylaY}" stroke="${c1}" stroke-width="2" stroke-linecap="round"/>`;
  h+=`<line x1="${takaX}" y1="${takaY}" x2="${takaX}" y2="${ylaY}" stroke="${c1}" stroke-width="2" stroke-linecap="round"/>`;
  h+=`<line x1="${etuX}" y1="${ylaY}" x2="${takaX}" y2="${ylaY}" stroke="${c1}" stroke-width="2" stroke-linecap="round"/>`;

  const jEtuX=kattoVasenX, jEtuKattoY=kattoVasenY;
  h+=`<line x1="${etuX}" y1="${etuY}" x2="${jEtuX}" y2="${jEtuKattoY}" stroke="${c1}" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>`;
  const alasLen=j25*scale;
  h+=`<line x1="${jEtuX}" y1="${jEtuKattoY}" x2="${jEtuX-normX*alasLen}" y2="${jEtuKattoY-normY*alasLen}" stroke="${c1}" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>`;
  h+=`<line x1="${takaX}" y1="${takaY}" x2="${harjaX}" y2="${harjaY}" stroke="${c1}" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>`;

  // Vinomitta
  h+=`<line x1="${etuX}" y1="${etuY}" x2="${takaX}" y2="${takaY}" stroke="${cInfo}" stroke-width="1" stroke-dasharray="3 3"/>`;
  h+=`<text x="${(etuX+takaX)/2}" y="${(etuY+takaY)/2+14}" text-anchor="middle" font-size="10" fill="${cInfo}" font-family="system-ui">↗ vino ${r(vinomitta)}</text>`;

  // Suora mitta
  const smY=ylaY-14;
  h+=`<line x1="${etuX}" y1="${smY}" x2="${takaX}" y2="${smY}" stroke="${c2}" stroke-width="0.8" marker-end="url(#arr2)" marker-start="url(#arr2)"/>`;
  h+=`<text x="${(etuX+takaX)/2}" y="${smY-5}" text-anchor="middle" font-size="11" fill="${c2}" font-family="system-ui">Suora ${suora}</text>`;
  if (hSivEtenemä>0) h+=`<text x="${(etuX+takaX)/2}" y="${smY+12}" text-anchor="middle" font-size="10" fill="${cInfo}" font-family="system-ui">↳ etenemä ${hSivEtenemä}</text>`;

  // Etukorkeus
  const eMX=etuX-26, etuMittaY=ylaY+(etuY-ylaY)*0.25;
  h+=`<line x1="${eMX}" y1="${ylaY}" x2="${eMX}" y2="${etuY}" stroke="${c2}" stroke-width="0.8" marker-end="url(#arr2)" marker-start="url(#arr2)"/>`;
  h+=`<text x="${eMX-4}" y="${etuMittaY}" text-anchor="end" font-size="11" fill="${c2}" font-family="system-ui">Etu ${etukork}</text>`;
  h+=`<text x="${eMX-4}" y="${etuMittaY+14}" text-anchor="end" font-size="10" fill="${cInfo}" font-family="system-ui">↳ ${r(hEtuKork)}</text>`;

  // Sivuviivojen saumat
  if (huppuSivutKpl>=2) {
    const diff=hEtuKork-hTakaKork;
    function pirraSivuSauma(frac,korkeus) {
      const vX=etuX+(takaX-etuX)*frac, vYbot=etuY+(takaY-etuY)*frac, vYtop=vYbot-korkeus*scale;
      h+=`<line x1="${vX}" y1="${vYtop}" x2="${vX}" y2="${vYbot}" stroke="${cInfo}" stroke-width="1.5" stroke-linecap="round"/>`;
      h+=`<text x="${vX-6}" y="${(vYtop+vYbot)/2+4}" text-anchor="end" font-size="10" fill="${cInfo}" font-family="system-ui">${r(korkeus)}</text>`;
    }
    if (huppuSivutKpl===2) pirraSivuSauma(0.5,hEtuKork-diff/2);
    else { pirraSivuSauma(1/3,hEtuKork-diff/3); pirraSivuSauma(2/3,hEtuKork-diff*2/3); }
  }

  // Takakorkeus
  const tMX=takaX+24, takaMittaY=ylaY+(takaY-ylaY)*0.25;
  h+=`<line x1="${tMX}" y1="${ylaY}" x2="${tMX}" y2="${takaY}" stroke="${c2}" stroke-width="0.8" marker-end="url(#arr2)" marker-start="url(#arr2)"/>`;
  h+=`<text x="${tMX+4}" y="${takaMittaY}" text-anchor="start" font-size="11" fill="${c2}" font-family="system-ui">Taka ${takakork}</text>`;
  h+=`<text x="${tMX+4}" y="${takaMittaY+14}" text-anchor="start" font-size="10" fill="${cInfo}" font-family="system-ui">↳ ${r(hTakaKork)}</text>`;

  // Harjalle mitta
  const hjOff=14;
  const hj1X=takaX-normX*hjOff, hj1Y=takaY-normY*hjOff;
  const hj2X=harjaX-normX*hjOff, hj2Y=harjaY-normY*hjOff;
  const hjMidX=(hj1X+hj2X)/2, hjMidY=(hj1Y+hj2Y)/2;
  h+=`<line x1="${hj1X}" y1="${hj1Y}" x2="${hj2X}" y2="${hj2Y}" stroke="${c2}" stroke-width="0.8" marker-end="url(#arr2)" marker-start="url(#arr2)"/>`;
  h+=`<text x="${hjMidX}" y="${hjMidY+14}" text-anchor="middle" font-size="11" fill="${c2}" font-family="system-ui">harjalle ${harjalle}</text>`;

  // Eteen piipusta (k24) — vaakamitta kattoviivan alla
  if (k24>0) {
    const k24Y = etuY + 22;
    h+=`<line x1="${kattoVasenX}" y1="${k24Y}" x2="${etuX}" y2="${k24Y}" stroke="${cInfo}" stroke-width="0.8" marker-end="url(#arr2)" marker-start="url(#arr2)"/>`;
    h+=`<text x="${(kattoVasenX+etuX)/2}" y="${k24Y+13}" text-anchor="middle" font-size="11" fill="${cInfo}" font-family="system-ui">eteen ${k24}</text>`;
  }

  // Alas (j25) — pystymitta kattoviivan vieressä
  if (j25>0) {
    const j25X = kattoVasenX - 20;
    const j25bot = jEtuKattoY - normY*alasLen;
    const j25botX = jEtuX - normX*alasLen;
    h+=`<line x1="${j25X}" y1="${jEtuKattoY}" x2="${j25X}" y2="${j25bot+(j25bot-jEtuKattoY<0?-2:2)}" stroke="${cInfo}" stroke-width="0.8" marker-end="url(#arr2)" marker-start="url(#arr2)"/>`;
    h+=`<text x="${j25X-4}" y="${(jEtuKattoY+j25bot)/2+4}" text-anchor="end" font-size="11" fill="${cInfo}" font-family="system-ui">alas ${j25}</text>`;
  }

  // Suhde
  const kattokulma_deg=kattokulma_rad*180/Math.PI;
  const suhde=korkeuserot>0?(suora/korkeuserot).toFixed(1):'—';
  h+=`<text x="${W-10}" y="20" text-anchor="end" font-size="11" fill="${c2}" font-family="system-ui">1:${suhde}</text>`;

  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${h}</svg>`;
}

// ── Renderöi taulu statusnapeilla ─────────────────────────
function renderTauluStatus(pellit, items, label) {
  let tot=0;
  const rows = pellit.map(p => {
    const m2 = typeof p.lev==='number'&&typeof p.pit==='number' ? p.lev*p.pit*p.kpl/1000000 : null;
    if (m2!==null) tot+=m2;

    // Etsi vastaava Supabase-rivi nimikkeen perusteella
    const item = items.find(i => i.nimike===p.osa);
    const supaRow = item?.order_item_rows?.[0];
    const rowId = supaRow?.id;
    const itemId = item?.id;
    const status = supaRow?.production_status||'WAITING';
    const rsIdx = STEP_KEYS.indexOf(status);
    const isDone = status==='DONE';

    const stepBtns = STEP_KEYS.map((key,si) => {
      const cls = si===rsIdx?' active':si<rsIdx?' passed':'';
      return `<button class="step-btn${cls}" data-key="${key}"
        onclick="setStatus('${rowId}','${key}','${itemId}',this)"
        ${!rowId?'disabled title="ei dataa"':''}>${STEPS[si]}</button>`;
    }).join('');

    // Mobiili: yksi nappi joka siirtää seuraavaan vaiheeseen
    const nextIdx = Math.min(rsIdx+1, STEP_KEYS.length-1);
    const nextKey = STEP_KEYS[nextIdx];
    const mobileLabel = isDone ? '✓ Valmis' : `${STEPS[rsIdx]} → ${STEPS[nextIdx]}`;
    const mobileBtnHtml = `<button class="step-btn-mobile status-${status}"
      onclick="setStatusMobile('${rowId}','${nextKey}','${itemId}',${rsIdx},this)"
      ${!rowId?'disabled':''}>${mobileLabel}</button>`;

    return `<tr class="${isDone?'row-done':''}">
      <td class="td-osa">${p.osa}</td>
      <td class="td-num">${p.lev}</td>
      <td style="color:var(--text-dim)">×</td>
      <td class="td-num">${typeof p.pit==='number'?p.pit:''}</td>
      <td class="td-num">${p.kpl}</td>
      <td><div class="step-btns">${stepBtns}</div>${mobileBtnHtml}</td>
    </tr>`;
  }).join('');

  return `<div class="section-card">
    <h3>${label}</h3>
    <table>
      <thead><tr>
        <th>Osa</th><th class="td-num">Lev</th><th></th>
        <th class="td-num">Pit</th><th class="td-num">Kpl</th>
        <th>Vaihe</th>
      </tr></thead>
      <tbody>${rows}
        <tr><td colspan="4" style="color:var(--text-dim);font-size:11px;padding-top:6px">Yhteensä</td>
        <td colspan="2" style="text-align:right;font-family:'IBM Plex Mono',monospace;color:var(--accent)">${tot.toFixed(3)} m²</td></tr>
      </tbody>
    </table>
  </div>`;
}

// ── Päivitä status Supabaseen ──────────────────────────────
async function setStatus(rowId, key, itemId, btn) {
  if (!rowId) return;
  const tr = btn.closest('tr');
  const allBtns = tr.querySelectorAll('.step-btn');
  const newIdx = STEP_KEYS.indexOf(key);

  // Päivitä UI heti
  allBtns.forEach((b,si) => {
    b.classList.remove('active','passed');
    if (si===newIdx) b.classList.add('active');
    else if (si<newIdx) b.classList.add('passed');
  });
  tr.classList.toggle('row-done', key==='DONE');

  // Tallenna Supabaseen
  await fetch(`${SUPA_URL}/rest/v1/order_item_rows?id=eq.${rowId}`, {
    method: 'PATCH',
    headers: { ...headers, 'Prefer': 'return=minimal' },
    body: JSON.stringify({ production_status: key })
  });

  // Päivitä myös order_item production_status
  if (itemId) {
    await fetch(`${SUPA_URL}/rest/v1/order_items?id=eq.${itemId}`, {
      method: 'PATCH',
      headers: { ...headers, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ production_status: key })
    });
  }
}

// ── Rakenna mitat-lista kahdessa kategoriassa ─────────────
function mittalista(v) {
  if (!v) return '';

  const rivi = (lbl, val, yksikko='mm') =>
    val ? `<div class="mitta-row"><span class="mitta-label">${lbl}</span><span class="mitta-val">${val} ${yksikko}</span></div>` : '';

  const juuret = [
    rivi('Vasen ylitys', v.vasen),
    rivi('Oikea ylitys', v.oikea),
    rivi('Uraan', v.poimu),
    rivi('Uraan kulma', v.harjakulma, '°'),
    rivi('Juuri sauma', v.juurisauma),
  ].filter(Boolean).join('');

  const huppu = [
    rivi('Hupun yläreuna', v.ylareunaV),
    rivi('Hupun alatupla', v.alatupla),
    rivi('Vähennys korkeudesta', v.vahennys),
    rivi('Lisää hupun kokoon', v.huplis),
    rivi('Huppu takaa leveämpi', v.huptakalis),
  ].filter(Boolean).join('');

  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 24px;">
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Juuren mitat</div>
        ${juuret||'—'}
      </div>
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Hupun mitat</div>
        ${huppu||'—'}
      </div>
    </div>`;
}

// ── Mobiili: siirry seuraavaan vaiheeseen ─────────────────
async function setStatusMobile(rowId, nextKey, itemId, currentIdx, btn) {
  if (!rowId) return;
  // Jos jo DONE, kierrä takaisin WAITING:iin
  const key = currentIdx >= STEP_KEYS.length-1 ? 'WAITING' : nextKey;
  const newIdx = STEP_KEYS.indexOf(key);

  // Päivitä mobiilinappi
  btn.className = `step-btn-mobile status-${key}`;
  const nextNextIdx = Math.min(newIdx+1, STEP_KEYS.length-1);
  btn.textContent = key==='DONE' ? '✓ Valmis' : `${STEPS[newIdx]} → ${STEPS[nextNextIdx]}`;
  btn.setAttribute('onclick', `setStatusMobile('${rowId}','${STEP_KEYS[nextNextIdx]}','${itemId}',${newIdx},this)`);

  // Päivitä myös desktop-napit samassa rivissä
  const tr = btn.closest('tr');
  tr.classList.toggle('row-done', key==='DONE');
  tr.querySelectorAll('.step-btn').forEach((b,si) => {
    b.classList.remove('active','passed');
    if (si===newIdx) b.classList.add('active');
    else if (si<newIdx) b.classList.add('passed');
  });

  // Tallenna
  await fetch(`${SUPA_URL}/rest/v1/order_item_rows?id=eq.${rowId}`, {
    method: 'PATCH',
    headers: { ...headers, 'Prefer': 'return=minimal' },
    body: JSON.stringify({ production_status: key })
  });
  if (itemId) {
    await fetch(`${SUPA_URL}/rest/v1/order_items?id=eq.${itemId}`, {
      method: 'PATCH',
      headers: { ...headers, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ production_status: key })
    });
  }
}

          </span>
          <span style="font-weight:400;color:var(--text);">
            Takakulma: <strong style="font-family:'IBM Plex Mono',monospace">${180-Math.round(Math.atan((v.suora||0)/(v.etukork-v.takakork||1))*180/Math.PI)}°</strong>
          </span>
          <span style="font-weight:400;color:var(--text);">
            Kaltevuus: <strong style="font-family:'IBM Plex Mono',monospace">1:${((v.suora||0)/(v.etukork-v.takakork||1)).toFixed(1)}</strong>
          </span>`:''}
      </h3>
      <div class="svg-wrap" style="padding:16px">${svgHtml}</div>
    </div>`:''}

    <div class="two-col" style="margin-bottom:16px">
      ${renderTauluStatus(juuret, items, 'Juuret')}
      ${renderTauluStatus(muut, items, 'Huppu / Kansi / Hattu')}
    </div>

    <div class="section-card">
      <h3>Mitat</h3>
      <div style="padding:14px 18px">${mittalista(v)}</div>
    </div>
  `;
}

load();
</script>
</body>
</html>
