<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piippu — Kalajoen Peltityö</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1a;
    --bg2: #111827;
    --bg3: #1a2332;
    --bg4: #1e2d3d;
    --text: #e2eef5;
    --text2: #6b8fa8;
    --border: #1e3a4a;
    --accent: #22c55e;
    --accent2: #16a34a;
    --input-bg: #111827;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; min-height: 100vh; }

  /* Navigointipalkki */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo { height: 36px; width: auto; filter: brightness(0) invert(1); flex-shrink: 0; }
  .header-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
  }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .menu-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text2);
    padding: 6px 10px;
    cursor: pointer;
    font-size: 16px;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: border-color 0.15s, color 0.15s;
  }
  .menu-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-dropdown {
    display: none;
    position: absolute;
    top: 52px;
    right: 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    min-width: 180px;
    z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .nav-dropdown.open { display: block; }
  .nav-dropdown a {
    display: block;
    padding: 10px 16px;
    color: var(--text2);
    text-decoration: none;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s, color 0.1s;
  }
  .nav-dropdown a:last-child { border-bottom: none; }
  .nav-dropdown a:hover { background: var(--bg3); color: var(--text); }
  .nav-dropdown a.active { color: var(--accent); }

  .main { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 52px); overflow: hidden; }
  .sidebar { background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .content { overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }

  .section { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; }
  .section h3 { font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .section h3.red { color: var(--red); }

  .field { display: flex; flex-direction: column; gap: 3px; margin-bottom: 6px; }
  .field label { font-size: 11px; color: var(--text2); }
  .field input[type=number] { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; color: var(--text); padding: 5px 8px; font-size: 13px; width: 100%; font-family: 'IBM Plex Mono', monospace; }
  .field input[type=number]:focus { outline: none; border-color: var(--accent); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

  .checks { display: flex; flex-direction: column; gap: 5px; }
  .check-item { display: flex; align-items: center; gap: 8px; }
  .check-item input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
  .check-item label { font-size: 13px; cursor: pointer; }
  .sauma-options { display: flex; gap: 6px; margin-left: 23px; margin-top: 2px; }
  .sauma-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; color: var(--text2); padding: 3px 10px; font-size: 12px; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; transition: border-color 0.15s; }
  .sauma-btn.active { background: var(--accent2); border-color: var(--accent); color: white; }

  .vakio-grid { display: grid; grid-template-columns: 1fr 56px; gap: 3px 8px; align-items: center; }
  .vakio-grid label { font-size: 11px; color: var(--text2); }
  .vakio-grid input[type=number] { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; color: var(--text); padding: 3px 5px; font-size: 12px; width: 56px; text-align: right; font-family: 'IBM Plex Mono', monospace; }
  .vakio-grid input[type=number]:focus { outline: none; border-color: var(--accent); }
  .vakio-grid input.red-input { border-color: var(--red) !important; }

  .kuva-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 12px 16px; }
  .kuva-card svg { width: 100%; display: block; }
  .kulmat { display: flex; gap: 40px; padding: 8px 0 2px; border-top: 1px solid var(--border); margin-top: 8px; }
  .kulma-item { font-size: 12px; color: var(--text2); }
  .kulma-item span { color: var(--text); font-weight: 600; font-size: 14px; margin-left: 6px; }

  .luettelo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .luettelo-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 14px; }
  .luettelo-card h3 { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { color: var(--text2); font-weight: 500; text-align: left; padding: 3px 6px; border-bottom: 1px solid var(--border); font-size: 11px; }
  td { padding: 5px 6px; border-bottom: 1px solid #1a2744; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }
  .td-num { text-align: right; font-variant-numeric: tabular-nums; }
  .td-sym { text-align: center; color: var(--text2); font-size: 11px; }
  .total-row td { border-top: 1px solid var(--border); font-weight: 600; color: var(--accent); padding-top: 7px; }
  .empty-msg { color: var(--text2); font-size: 12px; text-align: center; padding: 16px 0; }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; height: auto; overflow: visible; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    .luettelo-grid { grid-template-columns: 1fr; }
    .nav-links { display: none; }
  }
</style>
</head>
<body>

<header>
  <img src="../kpt-logo.png" alt="KPT" class="header-logo" onerror="this.style.display='none'">
  <span class="header-title">Piippu</span>
  <div class="header-right">
    <button class="menu-btn" onclick="toggleMenu()" id="menuBtn">☰ Valikko</button>
  </div>
  <div class="nav-dropdown" id="navDropdown">
    <a href="tilaukset.html">Tilaukset</a>
    <a href="tilaus.html">Uusi tilaus</a>
    <a href="peltipiirturi.html">Mallisto</a>
    <a href="vakiomallit.html">Vakiomallit</a>
    <a href="piippu.html" class="active">Piippu</a>
    <a href="asiakkaat.html">Asiakkaat</a>
    <a href="tuotanto.html">Tuotanto</a>
  </div>
</header>

<div class="main">
<div class="sidebar">

  <div class="section">
    <h3>Piipun osat</h3>
    <div class="checks">
      <div class="check-item">
        <input type="checkbox" id="chk-juuret" checked onchange="laske()">
        <label for="chk-juuret">Juuret</label>
      </div>
      <div class="check-item">
        <input type="checkbox" id="chk-huppu" checked onchange="laske()">
        <label for="chk-huppu">Huppu</label>
      </div>
      <div class="sauma-options">
        <button class="sauma-btn active" id="sauma1" onclick="setSauma(1)">Sauma 1</button>
        <button class="sauma-btn" id="sauma2" onclick="setSauma(2)">Sauma 2</button>
      </div>
      <div class="check-item">
        <input type="checkbox" id="chk-kansi" checked onchange="laske()">
        <label for="chk-kansi">Kansi</label>
      </div>
      <div class="check-item">
        <input type="checkbox" id="chk-hattu" checked onchange="laske()">
        <label for="chk-hattu">Hattu</label>
      </div>
    </div>
  </div>

  <div class="section">
    <h3>Piipun mitat</h3>
    <div class="field">
      <label>Piipun leveys (mm)</label>
      <input type="number" id="leveys" value="400" min="0" oninput="laske()">
    </div>
    <div class="field">
      <label>Suora mitta — pituus katolla (mm)</label>
      <input type="number" id="suora" value="600" min="0" oninput="laske()">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Etukorkeus (mm)</label>
        <input type="number" id="etukork" value="1000" min="0" oninput="laske()">
      </div>
      <div class="field">
        <label>Takakorkeus (mm)</label>
        <input type="number" id="takakork" value="800" min="0" oninput="laske()">
      </div>
    </div>
    <div class="field">
      <label>Takareunasta harjalle (mm)</label>
      <input type="number" id="harjalle" value="1050" min="0" oninput="laske()">
    </div>
  </div>

  <div class="section">
    <h3>Sivumitat</h3>
    <div class="field-row">
      <div class="field">
        <label>Vasen — poimuun (mm)</label>
        <input type="number" id="vasen" value="150" min="0" oninput="laske()">
      </div>
      <div class="field">
        <label>Oikea — poimuun (mm)</label>
        <input type="number" id="oikea" value="100" min="0" oninput="laske()">
      </div>
    </div>
    <div class="field">
      <label>Poimun ylitys vasemmalle (mm)</label>
      <input type="number" id="poimu" value="20" min="0" oninput="laske()">
    </div>
  </div>

  <div class="section">
    <h3>Juuri — etuosa</h3>
    <div class="field-row">
      <div class="field">
        <label>Eteen piipusta K24 (mm)</label>
        <input type="number" id="k24" value="200" min="0" oninput="laske()">
      </div>
      <div class="field">
        <label>Alas / saumavara J25 (mm)</label>
        <input type="number" id="j25" value="15" min="0" oninput="laske()">
      </div>
    </div>
  </div>

  <div class="section">
    <h3>Juuren mitat</h3>
    <div class="vakio-grid">
      <label>Tuplat juuriin</label>
      <input type="number" id="v-tupla" value="15" oninput="laske()">
      <label>Juuri etu lisäys leveyteen</label>
      <input type="number" id="v-etulis" value="40" oninput="laske()">
      <label>Juuri taka leveämpi</label>
      <input type="number" id="v-takalis" value="10" oninput="laske()">
      <label>Juuri nousee piipulle</label>
      <input type="number" id="v-nousu" value="200" oninput="laske()">
    </div>
  </div>

  <div class="section">
    <h3 class="red">Hupun mitat ⚠</h3>
    <div class="vakio-grid">
      <label>Sauma</label>
      <input type="number" id="v-sauma" value="20" oninput="laske()">
      <label>Lisää hupun kokoon</label>
      <input type="number" id="v-huplis" value="10" oninput="laske()">
      <label>Hupun yläreuna ⚠</label>
      <input type="number" id="v-ylareunaV" value="20" class="red-input" oninput="laske()">
      <label>Hupun alatuplat</label>
      <input type="number" id="v-alatupla" value="20" oninput="laske()">
      <label>Vähennys korkeudesta</label>
      <input type="number" id="v-vahennys" value="20" oninput="laske()">
      <label>Huppu takaa leveämpi</label>
      <input type="number" id="v-huptakalis" value="5" oninput="laske()">
      <label>Hattu piippua isompi</label>
      <input type="number" id="v-hattulis" value="250" oninput="laske()">
    </div>
  </div>

</div>

<div class="content">

  <div class="kuva-card">
    <svg id="piippu-svg" viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      <g id="svg-content"></g>
    </svg>
    <div class="kulmat">
      <div class="kulma-item">Etukulma (kanttikoneeseen):<span id="etukulma-txt">—</span>°</div>
      <div class="kulma-item">Takakulma (kanttikoneeseen):<span id="takakulma-txt">—</span>°</div>
    </div>
  </div>

  <div class="luettelo-grid">
    <div class="luettelo-card">
      <h3>Juuret</h3>
      <div id="luettelo-juuret"><p class="empty-msg">—</p></div>
    </div>
    <div class="luettelo-card">
      <h3>Huppu / Kansi / Hattu</h3>
      <div id="luettelo-huppu"><p class="empty-msg">—</p></div>
    </div>
  </div>

</div>
</div>

<script>
let saumatyyppi = 1;
function setSauma(n) {
  saumatyyppi = n;
  document.getElementById('sauma1').classList.toggle('active', n===1);
  document.getElementById('sauma2').classList.toggle('active', n===2);
  laske();
}
function gv(id) { return parseFloat(document.getElementById(id).value) || 0; }
function chk(id) { return document.getElementById(id).checked; }
function r(n) { return Math.round(n); }

function laske() {
  const leveys   = gv('leveys');
  const suora    = gv('suora');
  const etukork  = gv('etukork');
  const takakork = gv('takakork');
  const vasen    = gv('vasen');
  const oikea    = gv('oikea');
  const poimu    = gv('poimu');
  const k24      = gv('k24');
  const j25      = gv('j25');
  const harjalle = gv('harjalle');

  const tupla   = gv('v-tupla');
  const etulis  = gv('v-etulis');
  const takalis = gv('v-takalis');
  const nousu   = gv('v-nousu');

  const sauma      = gv('v-sauma');
  const huplis     = gv('v-huplis');
  const ylareunaV  = gv('v-ylareunaV');
  const alatupla   = gv('v-alatupla');
  const vahennys   = gv('v-vahennys');
  const huptakalis = gv('v-huptakalis');
  const hattulis   = gv('v-hattulis');

  const hasJuuret = chk('chk-juuret');
  const hasHuppu  = chk('chk-huppu');
  const hasKansi  = chk('chk-kansi');
  const hasHattu  = chk('chk-hattu');

  // Geometria
  const korkeuserot = etukork - takakork;
  const vinomitta = Math.sqrt(suora*suora + korkeuserot*korkeuserot);
  const kattokulma_rad = korkeuserot !== 0 ? Math.atan(suora / korkeuserot) : Math.PI/2;
  const kattokulma_deg = kattokulma_rad * 180 / Math.PI;
  const etukulma = r(kattokulma_deg);
  const takakulma = 180 - etukulma;

  document.getElementById('etukulma-txt').textContent = etukulma;
  document.getElementById('takakulma-txt').textContent = takakulma;

  // P10: vaakakomponentti kun nousu on pystysuorassa
  const p10 = Math.sin(kattokulma_rad) > 0 ? nousu / Math.sin(kattokulma_rad) : nousu;
  const vinokomp = p10 > nousu ? Math.sqrt(p10*p10 - nousu*nousu) : 0;

  // Q9: juuri takaa piipulle
  const q9 = hasHuppu ? (nousu + 20) : p10;

  // Kaltevuuskorjaus hupun korkeuteen
  const kaltkorj = (huplis / 2) * Math.tan(kattokulma_rad);

  const juuret = [];
  const muut = [];

  // JUURET
  if (hasJuuret) {
    const jEtuLev = leveys + etulis;
    const jEtuPit = (j25 > 0 ? j25 : tupla) + k24 + j25 + q9;
    juuret.push({ osa: 'Juuri etu', lev: r(jEtuLev), pit: r(jEtuPit), kpl: 1 });

    const jSivuPit = k24 + vinomitta + vinokomp + 2*j25 + 30;
    const jOikLev  = oikea + poimu + nousu + tupla;
    const jVasLev  = vasen + poimu + nousu + tupla;
    juuret.push({ osa: 'Juuri oikea', lev: r(jOikLev), pit: r(jSivuPit), kpl: 1 });
    juuret.push({ osa: 'Juuri vasen', lev: r(jVasLev), pit: r(jSivuPit), kpl: 1 });

    // Taka: takalis EI vaikuta huppuun
    const jTakaLev = vasen + oikea + leveys + tupla*2 + poimu*2 + takalis;
    const jTakaPit = harjalle + q9;
    juuret.push({ osa: 'Juuri taka', lev: r(jTakaLev), pit: r(jTakaPit), kpl: 1 });
  }

  // HUPPU
  if (hasHuppu) {
    const hEtuLev  = leveys + sauma*2 + huplis;
    const hEtuKork = etukork + ylareunaV + alatupla + kaltkorj - vahennys;
    muut.push({ osa: 'Huppu etu', lev: r(hEtuLev), pit: r(hEtuKork), kpl: 1 });

    const hSivLev  = suora + sauma*3 + huplis;
    muut.push({ osa: 'Huppu sivut', lev: r(hSivLev), pit: r(hEtuKork), kpl: 2 });

    const hTakaLev  = leveys + sauma*4 + huplis + huptakalis;
    const hTakaKork = takakork + ylareunaV + alatupla - kaltkorj - vahennys;
    muut.push({ osa: 'Huppu taka', lev: r(hTakaLev), pit: r(hTakaKork), kpl: 1 });
  }

  // KANSI
  if (hasKansi) {
    const kLev = leveys + ylareunaV*2 + huplis + 10;
    const kPit = suora  + ylareunaV*2 + huplis + 10;
    muut.push({ osa: 'Kansi', lev: r(kLev), pit: r(kPit), kpl: 1 });
  }

  // HATTU
  if (hasHattu) {
    muut.push({ osa: 'Hattu', lev: r(leveys + hattulis), pit: r(suora + hattulis), kpl: 1 });
  }

  piirraKuva(leveys, suora, etukork, takakork, k24, j25, harjalle, vinomitta);
  renderTaulu('luettelo-juuret', juuret);
  renderTaulu('luettelo-huppu', muut);
}

function renderTaulu(elId, pellit) {
  const el = document.getElementById(elId);
  if (!pellit.length) { el.innerHTML = '<p class="empty-msg">—</p>'; return; }
  let tot = 0;
  const rows = pellit.map(p => {
    const m2 = p.lev * p.pit * p.kpl / 1000000;
    tot += m2;
    return `<tr>
      <td>${p.osa}</td>
      <td class="td-num">${p.lev}</td>
      <td class="td-sym">×</td>
      <td class="td-num">${p.pit}</td>
      <td class="td-num">${p.kpl}</td>
      <td class="td-num">${m2.toFixed(3)}</td>
    </tr>`;
  }).join('');
  el.innerHTML = `<table>
    <thead><tr>
      <th>Osa</th><th class="td-num">Lev</th><th></th>
      <th class="td-num">Pit</th><th class="td-num">Kpl</th><th class="td-num">m²</th>
    </tr></thead>
    <tbody>${rows}
    <tr class="total-row">
      <td colspan="5">Yhteensä</td>
      <td class="td-num">${tot.toFixed(3)} m²</td>
    </tr></tbody>
  </table>`;
}

function piirraKuva(leveys, suora, etukork, takakork, k24, j25, harjalle, vinomitta) {
  const svg = document.getElementById('svg-content');
  const W = 640, H = 260;
  const mL = 85, mR = 130, mT = 22, mB = 20;
  const drawW = W - mL - mR;
  const drawH = H - mT - mB;

  const maxKork = Math.max(etukork, takakork) || 1;
  const scaleX  = drawW * 0.52 / (suora || 1);
  const scaleY  = drawH * 0.72 / maxKork;
  const scale   = Math.min(scaleX, scaleY);

  const etuX = mL + 15;
  const piipW = suora * scale;
  const takaX = etuX + piipW;
  const etuY  = mT + drawH * 0.88;
  const takaY = etuY - (etukork - takakork) * scale;
  const slope = piipW > 0 ? (takaY - etuY) / piipW : 0;

  const kattoVasenX = etuX - 28;
  const kattoVasenY = etuY - slope * 28;
  const harjW  = Math.min(harjalle * scale * 0.32, drawW * 0.28);
  const harjaX = takaX + harjW;
  const harjaY = takaY + slope * harjW;

  const ylaY = Math.min(etuY - etukork * scale, takaY - takakork * scale);

  const c1 = '#f1f5f9', c2 = '#64748b', cInfo = '#38bdf8';
  let h = '';

  // Kattoviiva
  h += `<line x1="${kattoVasenX}" y1="${kattoVasenY}" x2="${harjaX}" y2="${harjaY}" stroke="${c2}" stroke-width="1.5" stroke-linecap="round"/>`;

  // Piipun runko
  h += `<line x1="${etuX}" y1="${etuY}" x2="${etuX}" y2="${ylaY}" stroke="${c1}" stroke-width="2" stroke-linecap="round"/>`;
  h += `<line x1="${takaX}" y1="${takaY}" x2="${takaX}" y2="${ylaY}" stroke="${c1}" stroke-width="2" stroke-linecap="round"/>`;
  h += `<line x1="${etuX}" y1="${ylaY}" x2="${takaX}" y2="${ylaY}" stroke="${c1}" stroke-width="2" stroke-linecap="round"/>`;

  // Juuri etu uloke + alas
  const jEtuUloke = Math.min(k24 * scale * 0.35, 28);
  const jEtuX = etuX - jEtuUloke;
  const jEtuKattoY = etuY + slope * jEtuUloke;
  h += `<line x1="${etuX}" y1="${etuY}" x2="${jEtuX}" y2="${jEtuKattoY}" stroke="${c1}" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>`;
  h += `<line x1="${jEtuX}" y1="${jEtuKattoY}" x2="${jEtuX}" y2="${jEtuKattoY + Math.min(j25*scale*0.6, 12)}" stroke="${c1}" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>`;

  // Juuri taka harjalle
  h += `<line x1="${takaX}" y1="${takaY}" x2="${harjaX}" y2="${harjaY}" stroke="${c1}" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>`;

  // Vinomitta
  h += `<line x1="${etuX}" y1="${etuY}" x2="${takaX}" y2="${takaY}" stroke="${cInfo}" stroke-width="1" stroke-dasharray="3 3"/>`;

  // Suora mitta
  const smY = ylaY - 14;
  h += `<line x1="${etuX}" y1="${smY}" x2="${takaX}" y2="${smY}" stroke="${c2}" stroke-width="0.8" marker-end="url(#arr)" marker-start="url(#arr)"/>`;
  h += `<text x="${(etuX+takaX)/2}" y="${smY-5}" text-anchor="middle" font-size="11" fill="${c2}" font-family="system-ui">Suora ${suora}</text>`;

  // Etukorkeus
  const eMX = etuX - 26;
  h += `<line x1="${eMX}" y1="${ylaY}" x2="${eMX}" y2="${etuY}" stroke="${c2}" stroke-width="0.8" marker-end="url(#arr)" marker-start="url(#arr)"/>`;
  h += `<text x="${eMX-4}" y="${(ylaY+etuY)/2+4}" text-anchor="end" font-size="11" fill="${c2}" font-family="system-ui">Etu ${etukork}</text>`;

  // Takakorkeus
  const tMX = takaX + 24;
  h += `<line x1="${tMX}" y1="${ylaY}" x2="${tMX}" y2="${takaY}" stroke="${c2}" stroke-width="0.8" marker-end="url(#arr)" marker-start="url(#arr)"/>`;
  h += `<text x="${tMX+4}" y="${(ylaY+takaY)/2+4}" text-anchor="start" font-size="11" fill="${c2}" font-family="system-ui">Taka ${takakork}</text>`;

  // Vinomitta teksti
  h += `<text x="${(etuX+takaX)/2}" y="${(etuY+takaY)/2+16}" text-anchor="middle" font-size="10" fill="${cInfo}" font-family="system-ui">↗ vino ${r(vinomitta)}</text>`;

  // Harjalle mitta — oikealla
  const hjMidX = (takaX + harjaX) / 2;
  const hjMidY = (takaY + harjaY) / 2;
  h += `<line x1="${takaX}" y1="${hjMidY+10}" x2="${harjaX}" y2="${hjMidY+10}" stroke="${c2}" stroke-width="0.8" marker-end="url(#arr)" marker-start="url(#arr)"/>`;
  h += `<text x="${hjMidX}" y="${hjMidY+24}" text-anchor="middle" font-size="10" fill="${c2}" font-family="system-ui">harjalle ${harjalle}</text>`;

  svg.innerHTML = h;
}

function r(n) { return Math.round(n); }
laske();
</script>

<script>
function toggleMenu() {
  document.getElementById('navDropdown').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('#menuBtn') && !e.target.closest('#navDropdown')) {
    document.getElementById('navDropdown').classList.remove('open');
  }
});
</script>
